name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'   # runs once a day at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Fetch GitHub Stats card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=aditya-sridhar-git&show_icons=true&theme=tokyonight&hide_border=true&hide_title=true&count_private=true" -o assets/stats.svg

      - name: Fetch Top Languages card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=aditya-sridhar-git&layout=compact&theme=tokyonight&hide_border=true&hide_title=true" -o assets/top-langs.svg

      - name: Fetch Streak Stats card
        run: |
          curl -s "https://streak-stats.demolab.com?user=aditya-sridhar-git&theme=tokyonight&hide_border=true" -o assets/streak.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats cards" && git push)
